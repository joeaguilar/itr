name: Auto Version

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write   # needed to dispatch the Release workflow after tagging

jobs:
  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    # Skip if the push is just a tag or if commit message contains [skip version]
    if: "!contains(github.event.head_commit.message, '[skip version]')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for git describe and log
          fetch-tags: true

      - name: Determine version bump and create tag
        run: |
          # Ensure all tags are available
          git fetch --tags --force

          # Get the latest version tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing version tags found, starting at v0.0.0"
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Get commits since last tag, including body/footer text for breaking-change footers.
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s%n%b%x1e")
          else
            COMMITS=$(git log --pretty=format:"%s%n%b%x1e")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG, skipping"
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          printf '%s' "$COMMITS" | tr '\036' '\n'

          # Determine bump type (highest wins)
          BUMP="none"
          while IFS= read -r -d $'\036' commit || [ -n "$commit" ]; do
            # First non-empty line is the subject. Using `sed -n '1p'` would
            # break every record after the first: git log inserts a newline
            # between records, so records 2+ have a leading blank line and
            # sed would return "" as the subject.
            subject=$(printf '%s' "$commit" | awk 'NF{print; exit}')
            # Breaking change: type!: subject or BREAKING CHANGE footer/body line
            if printf '%s\n' "$subject" | grep -qE '^[a-z]+(\(.+\))?!:' || \
               printf '%s\n' "$commit" | grep -qE '^BREAKING CHANGE:'; then
              BUMP="major"
              break
            fi
            # Feature
            if printf '%s\n' "$subject" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
            # Fix
            if printf '%s\n' "$subject" | grep -qE '^fix(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done < <(printf '%s' "$COMMITS")

          if [ "$BUMP" = "none" ]; then
            echo "No feat/fix commits found, skipping tag"
            exit 0
          fi

          # Apply bump
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP -> $NEW_TAG"

          # Sync the manifest so the tagged tree carries a matching version:
          # cargo's own output ("Compiling itr vX.Y.Z", `cargo install --list`)
          # and the tagless-checkout fallback in build.rs read this field (#213).
          # Plain text edits — no Rust toolchain needed on the runner.
          sed -i -E "0,/^version = \".*\"\$/s//version = \"${NEW_VERSION}\"/" Cargo.toml
          awk -v ver="$NEW_VERSION" '
            $0 == "name = \"itr\"" { print; getline; sub(/version = ".*"/, "version = \"" ver "\""); print; next }
            { print }
          ' Cargo.lock > Cargo.lock.tmp && mv Cargo.lock.tmp Cargo.lock

          if ! git diff --quiet -- Cargo.toml Cargo.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            # [skip version] keeps this push from re-triggering a bump; the
            # GITHUB_TOKEN push wouldn't trigger workflows anyway (defense in
            # depth). If main moved since checkout the push fails and the next
            # push to main retries the whole tagging run.
            git commit -m "chore(release): sync manifest version to ${NEW_TAG} [skip version]"
            git push origin HEAD:main
          fi

          # Create and push tag (points at the sync commit when one was made)
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Tagged $NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"

      - name: Dispatch Release workflow
        if: env.NEW_TAG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN cannot trigger push-on-tag workflows, but it CAN
          # trigger workflow_dispatch on workflows in the same repo. We use
          # that to fan out from auto-version into the release matrix.
          gh workflow run release.yml \
            --ref "$NEW_TAG" \
            -f tag="$NEW_TAG"
          echo "Dispatched release.yml for $NEW_TAG"
