name: Auto Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    # Skip if the push is just a tag or if commit message contains [skip version]
    if: "!contains(github.event.head_commit.message, '[skip version]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git describe and log

      - name: Determine version bump and create tag
        run: |
          # Get the latest version tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing version tags found, starting at v0.0.0"
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Get commits since last tag
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG, skipping"
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          # Determine bump type (highest wins)
          BUMP="none"
          while IFS= read -r msg; do
            # Breaking change: type!: or BREAKING CHANGE in body
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              BUMP="major"
              break
            fi
            # Feature
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
            # Fix
            if echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No feat/fix commits found, skipping tag"
            exit 0
          fi

          # Apply bump
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP -> $NEW_TAG"

          # Create and push tag
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Tagged $NEW_TAG"
